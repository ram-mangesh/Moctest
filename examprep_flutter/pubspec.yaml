name: examprep_app
description: ExamPrep — AI-powered exam preparation platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Navigation
  go_router: ^14.2.0

  # HTTP
  dio: ^5.4.3+1

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.4

  # Local Storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.2

  # Camera & Face Detection
  camera: ^0.11.0+2
  google_mlkit_face_detection: ^0.12.0

  # Speech
  speech_to_text: ^7.0.0
  flutter_tts: ^4.0.2

  # Charts
  fl_chart: ^0.68.0

  # WebSocket
  web_socket_channel: ^3.0.1

  # PDF
  pdf: ^3.10.8
  printing: ^5.13.1

  # UI & Animations
  lottie: ^3.1.2
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  flutter_animate: ^4.5.0
  glassmorphism: ^3.0.0
  lucide_icons: ^0.257.0
  file_picker: ^8.0.0+1

  # Utils
  intl: ^0.19.0
  url_launcher: ^6.3.0
  image_picker: ^1.1.2
  path_provider: ^2.1.3
  cupertino_icons: ^1.0.6
  gap: ^3.0.1
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/lottie/
