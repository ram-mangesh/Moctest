spring.application.name=Mocktest
server.port=8089

# =============================================
# DATABASE CONFIGURATION
# =============================================
spring.datasource.url=jdbc:mysql://localhost:3306/mocktest?useUnicode=true&characterEncoding=utf8
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=YOUR_DB_USERNAME
spring.datasource.password=YOUR_DB_PASSWORD
spring.jpa.hibernate.ddl-auto=update
server.tomcat.websocket.enabled=true

# =============================================
# MAIL CONFIGURATION
# =============================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=YOUR_GMAIL_ADDRESS
spring.mail.password=YOUR_GMAIL_APP_PASSWORD
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

app.mail.from=YOUR_GMAIL_ADDRESS
app.scheduler.enabled=true

# =============================================
# FILE UPLOAD
# =============================================
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# =============================================
# OLLAMA AI CONFIGURATION
# =============================================
ollama.nodes=http://YOUR_OLLAMA_HOST:11434
ollama.models=YOUR_MODEL_NAME

# =============================================
# OPEN ROUTER (Optional)
# =============================================
openrouter.api.key=YOUR_OPENROUTER_API_KEY
openrouter.url=https://openrouter.ai/api/v1/chat/completions
openrouter.model=openai/gpt-oss-120b:free

# =============================================
# TWILIO CONFIGURATION (SMS + Voice Call)
# =============================================
ai.twilio.account-sid=YOUR_TWILIO_ACCOUNT_SID
ai.twilio.auth-token=YOUR_TWILIO_AUTH_TOKEN
ai.twilio.phone-number=YOUR_TWILIO_PHONE_NUMBER

# =============================================
# INACTIVE STUDENT ALERT CONFIG
# =============================================
inactive.days.threshold=2
inactive.check.cron=0 0 9 * * ?

# =============================================
# PUBLIC URL FOR TWILIO WEBHOOKS
# =============================================
app.public-url=https://YOUR_PUBLIC_URL